<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap');
      .mono { font-family: 'Playfair Display', Georgia, serif; fill: #6b5744; }
      .sub { font-family: 'Lato', system-ui, sans-serif; fill: #9c7e65; letter-spacing: 0.2em; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="200" height="200" fill="#fffdf9"/>
  <!-- Outer thin circle -->
  <circle cx="100" cy="100" r="90" fill="none" stroke="#c8b49a" stroke-width="0.8" opacity="0.7"/>
  <!-- Inner thin circle -->
  <circle cx="100" cy="100" r="82" fill="none" stroke="#c8b49a" stroke-width="0.4" opacity="0.4"/>
  <!-- DCC Monogram -->
  <text x="100" y="115" class="mono" font-size="56" font-weight="600" text-anchor="middle" letter-spacing="0.05em">DCC</text>
  <!-- Small label -->
  <text x="100" y="152" class="sub" font-size="8.5" font-weight="300" text-anchor="middle">DAILYCOZYCORNER</text>
</svg>
