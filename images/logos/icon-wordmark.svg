<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 180" width="520" height="180">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap');
      .brand { font-family: 'Playfair Display', Georgia, serif; fill: #6b5744; }
      .tagline { font-family: 'Lato', system-ui, sans-serif; fill: #9c7e65; letter-spacing: 0.18em; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="520" height="180" fill="#fffdf9"/>

  <!-- ICON: Arched window / cozy corner (left side) -->
  <!-- Arch shape -->
  <path d="M58 130 L58 80 Q58 48 90 48 Q122 48 122 80 L122 130 Z"
        fill="none" stroke="#6b5744" stroke-width="2.2" stroke-linejoin="round"/>
  <!-- Inner arch detail -->
  <path d="M68 130 L68 84 Q68 60 90 60 Q112 60 112 84 L112 130"
        fill="none" stroke="#c8b49a" stroke-width="0.9" opacity="0.7"/>
  <!-- Small candle inside arch -->
  <!-- Candle body -->
  <rect x="85" y="102" width="10" height="18" rx="2" fill="#c8b49a" opacity="0.85"/>
  <!-- Flame -->
  <ellipse cx="90" cy="99" rx="3" ry="5" fill="#6b5744" opacity="0.7"/>
  <ellipse cx="90" cy="101" rx="1.8" ry="2.5" fill="#f5f0e8" opacity="0.8"/>
  <!-- Small plant / leaf on side -->
  <path d="M76 128 Q70 110 78 106 Q80 118 76 128Z" fill="#9c7e65" opacity="0.6"/>
  <!-- Ground line -->
  <line x1="55" y1="131" x2="125" y2="131" stroke="#6b5744" stroke-width="1.5" opacity="0.5"/>

  <!-- WORDMARK: right side -->
  <!-- Thin rule above text -->
  <line x1="150" y1="66" x2="490" y2="66" stroke="#c8b49a" stroke-width="0.5" opacity="0.6"/>
  <!-- Brand name -->
  <text x="320" y="112" class="brand" font-size="44" font-weight="400" text-anchor="middle" letter-spacing="0.03em">dailycozycorner</text>
  <!-- Tagline -->
  <text x="320" y="136" class="tagline" font-size="10" font-weight="300" text-anchor="middle">CURATED COZY HOME FINDS</text>
  <!-- Thin rule below text -->
  <line x1="150" y1="148" x2="490" y2="148" stroke="#c8b49a" stroke-width="0.5" opacity="0.6"/>

  <!-- Vertical divider between icon and text -->
  <line x1="142" y1="50" x2="142" y2="156" stroke="#c8b49a" stroke-width="0.6" opacity="0.4"/>
</svg>
