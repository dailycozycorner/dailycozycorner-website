<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160" width="600" height="160">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap');
      .brand { font-family: 'Playfair Display', Georgia, serif; fill: #6b5744; }
      .tagline { font-family: 'Lato', system-ui, sans-serif; fill: #9c7e65; letter-spacing: 0.18em; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="600" height="160" fill="#fffdf9" rx="0"/>
  <!-- Decorative thin rule above -->
  <line x1="40" y1="42" x2="560" y2="42" stroke="#c8b49a" stroke-width="0.6" opacity="0.6"/>
  <!-- Brand name -->
  <text x="300" y="100" class="brand" font-size="48" font-weight="400" text-anchor="middle" letter-spacing="0.04em">dailycozycorner</text>
  <!-- Tagline -->
  <text x="300" y="126" class="tagline" font-size="11" font-weight="300" text-anchor="middle">CURATED COZY HOME FINDS</text>
  <!-- Decorative thin rule below -->
  <line x1="40" y1="142" x2="560" y2="142" stroke="#c8b49a" stroke-width="0.6" opacity="0.6"/>
</svg>
