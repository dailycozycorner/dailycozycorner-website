<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 320" width="400" height="320">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&amp;display=swap');
      .brand { font-family: 'Playfair Display', Georgia, serif; fill: #6b5744; }
      .tagline { font-family: 'Lato', system-ui, sans-serif; fill: #9c7e65; letter-spacing: 0.22em; }
    </style>
  </defs>
  <!-- Background -->
  <rect width="400" height="320" fill="#fffdf9"/>

  <!-- ICON: Arch / cozy window centered top -->
  <!-- Outer arch -->
  <path d="M148 195 L148 130 Q148 88 200 88 Q252 88 252 130 L252 195 Z"
        fill="none" stroke="#6b5744" stroke-width="2.2"/>
  <!-- Inner arch -->
  <path d="M160 195 L160 135 Q160 102 200 102 Q240 102 240 135 L240 195"
        fill="none" stroke="#c8b49a" stroke-width="0.9" opacity="0.6"/>

  <!-- Candle inside -->
  <rect x="193" y="160" width="14" height="22" rx="3" fill="#c8b49a" opacity="0.9"/>
  <!-- Flame -->
  <path d="M200 156 Q204 148 200 142 Q196 148 200 156Z" fill="#6b5744" opacity="0.75"/>
  <!-- Glow -->
  <ellipse cx="200" cy="157" rx="4" ry="2.5" fill="#e8d9c4" opacity="0.6"/>

  <!-- Leaves / small plant left -->
  <path d="M168 192 Q158 172 168 162 Q172 178 168 192Z" fill="#9c7e65" opacity="0.55"/>
  <path d="M163 188 Q155 175 162 168 Q165 180 163 188Z" fill="#9c7e65" opacity="0.35"/>

  <!-- Ground line -->
  <line x1="144" y1="196" x2="256" y2="196" stroke="#6b5744" stroke-width="1.5" opacity="0.45"/>

  <!-- WORDMARK below icon -->
  <!-- Thin rule -->
  <line x1="40" y1="220" x2="360" y2="220" stroke="#c8b49a" stroke-width="0.6" opacity="0.5"/>
  <!-- Brand name -->
  <text x="200" y="258" class="brand" font-size="40" font-weight="400" text-anchor="middle" letter-spacing="0.04em">dailycozycorner</text>
  <!-- Tagline -->
  <text x="200" y="280" class="tagline" font-size="9.5" font-weight="300" text-anchor="middle">CURATED COZY HOME FINDS</text>
  <!-- Thin rule -->
  <line x1="40" y1="294" x2="360" y2="294" stroke="#c8b49a" stroke-width="0.6" opacity="0.5"/>
</svg>
